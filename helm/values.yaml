# CRD installation configuration
crds:
  # Install CRDs with this chart
  # Set to false if CRDs are managed separately or already installed
  install: true

# Loki configuration for log aggregation
loki:
  # Loki host (for fluent-bit)
  host: ""

  # Loki port (for fluent-bit)
  port: "3100"

  # TLS configuration
  tls: "off"
  tlsVerify: "off"

  # Tenant ID for Loki
  tenantId: ""

  # Authentication credentials (optional)
  auth:
    username: ""
    password: ""

  # Cluster name for log identification
  clusterName: "default"

# Controller configuration
controller:
  replicas: 1
  kubernetesClusterDomain: cluster.local

  # Enable validating webhooks for namespace management
  # Webhooks validate resources before creation and provide immediate feedback to kubectl
  # Set to false to disable webhooks (useful for local development without certificates)
  enableValidatingWebhooks: true

  # Controller arguments
  args:
  - --metrics-bind-address=:8443
  - --leader-elect
  - --health-probe-bind-address=:8081
  
  # Controller image
  image:
    repository: ghcr.io/kentrasecurity/docker/controller
    tag: 0.3.3
    pullPolicy: IfNotPresent
  
  # Image pull secrets for private registries
  imagePullSecrets: []
  # Example:
  # imagePullSecrets:
  #   - name: regcred
  
  # Resource limits and requests
  resources:
    limits:
      cpu: 500m
      memory: 128Mi
    requests:
      cpu: 10m
      memory: 64Mi
  
  # Container security context
  containerSecurityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
      - ALL
    readOnlyRootFilesystem: true
  
  # Pod security context
  podSecurityContext:
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault
  
  # Service account configuration
  serviceAccount:
    annotations: {}

  # Pod annotations - add custom annotations to controller pods
  podAnnotations: {}
  # Example:
  # podAnnotations:
  #   prometheus.io/scrape: "true"
  #   prometheus.io/port: "8443"

  # Pod labels - add custom labels to controller pods
  podLabels: {}
  # Example:
  # podLabels:
  #   environment: production
  #   team: security

  # Node selector for pod assignment
  nodeSelector: {}
  # Example:
  # nodeSelector:
  #   kubernetes.io/os: linux

  # Tolerations for pod assignment
  tolerations: []
  # Example:
  # tolerations:
  # - key: "key1"
  #   operator: "Equal"
  #   value: "value1"
  #   effect: "NoSchedule"

  # Affinity rules for pod assignment
  affinity: {}
  # Example:
  # affinity:
  #   nodeAffinity:
  #     requiredDuringSchedulingIgnoredDuringExecution:
  #       nodeSelectorTerms:
  #       - matchExpressions:
  #         - key: kubernetes.io/os
  #           operator: In
  #           values:
  #           - linux

# cert-manager configuration (for webhook TLS certificates)
certManager:
  # Enable cert-manager integration for webhook certificates
  # If true, cert-manager will automatically generate and manage TLS certificates
  # If false, you must provide certificates manually or disable webhooks
  enabled: true

# Metrics service configuration
service:
  type: ClusterIP
  ports:
  - name: https
    port: 8443
    protocol: TCP
    targetPort: 8443
