apiVersion: v2
name: kttack
description: |
  KTtack - Kubernetes Security Testing Framework
  A comprehensive Kubernetes Operator for orchestrating and managing security testing 
  operations. Deploy security scanners, enumeration tools, and attack simulations as 
  native Kubernetes resources with built-in logging and monitoring.
type: application

# Chart version - increment this when making changes to the chart
version: 0.1.1

# Application version - the version of KTtack being deployed
appVersion: "0.1.0"

# Keywords for chart discovery
keywords:
  - security
  - pentesting
  - vulnerability-scanning
  - enumeration
  - kubernetes-operator
  - security-testing

# Project information
home: https://github.com/kttack/kttack
sources:
  - https://github.com/kttack/kttack

maintainers:
  - name: KTtack Team
    url: https://github.com/kttack

# Chart icon (optional - add when available)
# icon: https://example.com/kttack-icon.png

# Kubernetes version constraints
kubeVersion: ">=1.11.3"
