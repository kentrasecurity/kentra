apiVersion: v2
name: kentra
description: |
  Kentra - Kubernetes Security Testing Framework
  A comprehensive Kubernetes Operator for orchestrating and managing security testing
  operations. Deploy security scanners, enumeration tools, and attack simulations as
  native Kubernetes resources with built-in logging and monitoring.
type: application

# Chart version - increment this when making changes to the chart
version: 0.1.9

# Application version - the version of Kentra being deployed
appVersion: "0.1.4"

# Keywords for chart discovery
keywords:
  - security
  - pentesting
  - vulnerability-scanning
  - enumeration
  - kubernetes-operator
  - security-testing

# Project information
home: https://github.com/kentra/kentra
sources:
  - https://github.com/kentra/kentra

maintainers:
  - name: Kentra Team
    url: https://github.com/kentra

# Chart icon (optional - add when available)
# icon: https://example.com/kentra-icon.png

# Kubernetes version constraints
kubeVersion: ">=1.11.3"
