apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "controller.fullname" . }}-controller
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/component: controller
    control-plane: controller-manager
  {{- include "controller.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.controller.replicas }}
  selector:
    matchLabels:
      control-plane: controller-manager
    {{- include "controller.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        app.kubernetes.io/component: controller
        control-plane: controller-manager
      {{- include "controller.selectorLabels" . | nindent 8 }}
      {{- with .Values.controller.podLabels }}
        {{- toYaml . | nindent 8 }}
      {{- end }}
      annotations:
        kubectl.kubernetes.io/default-container: manager
      {{- with .Values.controller.podAnnotations }}
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      containers:
      - args:
        {{- toYaml .Values.controller.args | nindent 8 }}
        command:
        - /manager
        env:
        - name: KUBERNETES_CLUSTER_DOMAIN
          value: {{ quote .Values.controller.kubernetesClusterDomain }}
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: ENABLE_WEBHOOKS
          value: {{ quote .Values.controller.enableValidatingWebhooks }}
        image: {{ .Values.controller.image.repository }}:{{ .Values.controller.image.tag | default .Chart.AppVersion }}
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8081
          initialDelaySeconds: 15
          periodSeconds: 20
        name: manager
        {{- if .Values.controller.enableValidatingWebhooks }}
        ports:
        - containerPort: 9443
          name: webhook-server
          protocol: TCP
        {{- end }}
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8081
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
        {{- toYaml .Values.controller.resources | nindent 10 }}
        securityContext:
        {{- toYaml .Values.controller.containerSecurityContext | nindent 10 }}
        {{- if and .Values.controller.enableValidatingWebhooks .Values.certManager.enabled }}
        volumeMounts:
        - mountPath: /tmp/k8s-webhook-server/serving-certs
          name: cert
          readOnly: true
        {{- end }}
      {{- if and .Values.controller.enableValidatingWebhooks .Values.certManager.enabled }}
      volumes:
      - name: cert
        secret:
          defaultMode: 420
          secretName: webhook-server-cert
      {{- end }}
      securityContext:
      {{- toYaml .Values.controller.podSecurityContext | nindent 8 }}
      serviceAccountName: {{ include "controller.fullname" . }}-controller-manager
      {{- if .Values.controller.imagePullSecrets }}
      imagePullSecrets:
        {{- if kindIs "slice" .Values.controller.imagePullSecrets }}
        {{- toYaml .Values.controller.imagePullSecrets | nindent 8 }}
        {{- else }}
        - name: {{ .Values.controller.imagePullSecrets }}
        {{- end }}
      {{- end }}
      {{- with .Values.controller.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.controller.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.controller.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      terminationGracePeriodSeconds: 10
