{{- if .Values.controller.enableValidatingWebhooks }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "controller.fullname" . }}-webhook-service
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/component: webhook
  {{- include "controller.labels" . | nindent 4 }}
spec:
  ports:
  - port: 443
    protocol: TCP
    targetPort: 9443
  selector:
    control-plane: controller-manager
  {{- include "controller.selectorLabels" . | nindent 4 }}
{{- end }}
