metadata:
  name: multi-host-pool
  namespace: kentra-system
spec:
  targets: 
    - 192.168.2.0/24
    - 192.168.1.201
    - 192.168.1.202
  port: "1-10000"
  description: "Three specific hosts for comprehensive port scanning"
---
apiVersion: kentra.sh/v1alpha1
kind: TargetPool
metadata:
  name: multi-host-pool
  namespace: kentra-system
spec:
  pool:
    targets: 
      - 192.168.2.0/24
      - 192.168.1.201
      - 192.168.1.202
    port: "1-10000"
    description: "Three specific hosts for comprehensive port scanning"

---
---
apiVersion: kentra.sh/v1alpha1
kind: Enumeration
metadata:
  name: netcat-banner-grab
  namespace: kentra-system
spec:
  args:
    - '-v'
    - '-w'
    - '5'
  category: Reconnaissance
  debug: true
  periodic: false
  targetPool: multi-host-pool
  tool: netcat
