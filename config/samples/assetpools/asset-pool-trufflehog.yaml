apiVersion: kttack.io/v1alpha1
kind: AssetPool
metadata:
  name: trufflehog-targets
  namespace: kentra-system
spec:
  description: Git repositories to scan
  pool:
    - assets:
        - type: subcommand
          value: git
        - type: uri
          value: https://github.com/rancher/docs
      name: rancher
    - assets:
        - type: subcommand
          value: git
        - type: uri
          value: https://github.com/kubernetes/kubernetes
      name: kubernetes