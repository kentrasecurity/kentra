apiVersion: kentra.sh/v1alpha1
kind: AssetPool
metadata:
  name: username-targets
  namespace: kentra-system
spec:
  description: Grouped assets - fully dynamic structure
  groups:
    - assetSets:
        - assets:
            - type: username
              value: john
            - type: username
              value: doe
            - type: email
              value: johndoe@gmail.com
            - type: phone
              value: '+1234567890'
          name: primary
        - assets:
            - type: username
              value: jhondoe
            - type: email
              value: johndoe@company.com
          name: secondary
      name: john-doe
    - assetSets:
        - assets:
            - type: username
              value: jane
          name: university
        - assets:
            - type: username
              value: janelove
            - type: email
              value: jane@personal.com
          name: personal
      name: jane-doe