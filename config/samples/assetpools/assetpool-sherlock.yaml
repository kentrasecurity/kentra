apiVersion: kentra.sh/v1alpha1
kind: AssetPool
metadata:
  name: contacts
  namespace: kentra-system
spec:
  description: Pool of assets
  pool:
    - assets:
        - type: username
          value: john
        - type: username
          value: doe
        - type: email
          value: john@gmail.com
        - type: phone
          value: '+1234567890'
      name: john
    - assets:
        - type: username
          value: jane
        - type: email
          value: jane@company.com
      name: jane




apiVersion: kentra.sh/v1alpha1
kind: AssetPool
metadata:
  name: contacts
  namespace: kentra-system
spec:
  description: Pool of assets
  asset:
    usernames:
      - john
      - doe
    email:
      - john@gmail.com
    phones:
      - '+1234567890'
  description: john

---
