apiVersion: v1
kind: ConfigMap
metadata:
  name: tool-specs
  namespace: kttack-system
data:
  tools: |
    nmap:
      type: "enumeration"
      category: "network"
      image: "instrumentisto/nmap:latest"
      commandTemplate: "/usr/bin/nmap {{.Args}} {{.Target}}"
      capabilities:
        add:
          - NET_RAW
    nikto:
      type: "enumeration"
      category: "network"
      image: "alpine/nikto:2.1.6"
      commandTemplate: "nikto.pl -h {{.Args}} {{.Target}}"
      capabilities:
        add: []
    rustscan:
      type: "enumeration"
      category: "network"
      image: "rustscan/rustscan:latest"
      commandTemplate: "/usr/local/bin/rustscan {{.Args}} {{.Target}}"
      capabilities:
        add:
          - NET_RAW        
    ping:
      type: "liveness"
      image: "giantswarm/ping:3.3.5"
      commandTemplate: "/ping {{.Args}} {{.Target}}"
      capabilities:
        add: []