apiVersion: v1
kind: Secret
metadata:
  name: loki-credentials
  namespace: kentra-system
  labels:
    app.kubernetes.io/name: kentra
    app.kubernetes.io/managed-by: kustomize
type: Opaque
stringData:
  loki-host: "loki.loki-system.svc.cluster.local"
  loki-port: "3100"
  loki-tls: "false"
  loki-tls-verify: "false"
  loki-tenant-id: "1"
  loki-user: "root-user"
  loki-password: "supersecretpassword"
  cluster-name: "k3s"
