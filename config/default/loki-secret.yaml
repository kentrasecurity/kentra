apiVersion: v1
kind: Secret
metadata:
  name: loki-credentials
  namespace: kentra-system
  labels:
    app.kubernetes.io/name: kentra
    app.kubernetes.io/managed-by: kustomize
    kentra.sh/resource-type: "loki-credentials"
type: Opaque
stringData:
  loki-host: "loki.loki-system.svc.cluster.local"
  loki-port: "3100"
  loki-tls: "off"
  loki-tls-verify: "off"
  loki-tenant-id: ""
  loki-user: ""
  loki-password: ""
  cluster-name: "default"
