apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
- ../../default

# Replace the base image with your local one
images:
- name: ghcr.io/kentrasecurity/controller
  newName:  controller
  newTag: test

# Patch the deployment to use IfNotPresent so it doesn't try to pull from GHCR
patches:
- target:
    kind: Deployment
    name: controller-manager
  patch: |-
    - op: replace
      path: /spec/template/spec/containers/0/imagePullPolicy
      value: IfNotPresent