---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: validating-webhook-configuration
webhooks:
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: webhook-service
      namespace: system
      path: /validate-kentra-sh-v1alpha1-assetpool
  failurePolicy: Fail
  name: vassetpool.kb.io
  rules:
  - apiGroups:
    - kentra.sh
    apiVersions:
    - v1alpha1
    operations:
    - CREATE
    - UPDATE
    resources:
    - assetpools
  sideEffects: None
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: webhook-service
      namespace: system
      path: /validate-kentra-sh-v1alpha1-enumeration
  failurePolicy: Fail
  name: venumeration.kb.io
  rules:
  - apiGroups:
    - kentra.sh
    apiVersions:
    - v1alpha1
    operations:
    - CREATE
    - UPDATE
    resources:
    - enumerations
  sideEffects: None
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: webhook-service
      namespace: system
      path: /validate-kentra-sh-v1alpha1-liveness
  failurePolicy: Fail
  name: vliveness.kb.io
  rules:
  - apiGroups:
    - kentra.sh
    apiVersions:
    - v1alpha1
    operations:
    - CREATE
    - UPDATE
    resources:
    - livenesses
  sideEffects: None
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: webhook-service
      namespace: system
      path: /validate-kentra-sh-v1alpha1-osint
  failurePolicy: Fail
  name: vosint.kb.io
  rules:
  - apiGroups:
    - kentra.sh
    apiVersions:
    - v1alpha1
    operations:
    - CREATE
    - UPDATE
    resources:
    - osints
  sideEffects: None
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: webhook-service
      namespace: system
      path: /validate-kentra-sh-v1alpha1-securityattack
  failurePolicy: Fail
  name: vsecurityattack.kb.io
  rules:
  - apiGroups:
    - kentra.sh
    apiVersions:
    - v1alpha1
    operations:
    - CREATE
