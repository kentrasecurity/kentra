    - kentra.sh
    apiVersions:
    - v1alpha1
    operations:
    - CREATE
    - UPDATE
    resources:
    - storagepools
  sideEffects: None
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: webhook-service
      namespace: system
      path: /validate-kentra-sh-v1alpha1-targetpool
  failurePolicy: Fail
  name: vtargetpool.kb.io
  rules:
  - apiGroups:
    - kentra.sh
    apiVersions:
    - v1alpha1
    operations:
    - CREATE
    - UPDATE
    resources:
    - targetpools
  sideEffects: None
