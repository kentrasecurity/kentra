---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manager-role
rules:
- apiGroups:
  - ""
  resources:
  - configmaps
  - pods
  - secrets
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - batch
  resources:
  - cronjobs
  - jobs
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - kttack.io
  resources:
  - enumerations
  - livenesses
  - securityattacks
  - storagegroups
  - targetgroups
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - kttack.io
  resources:
  - enumerations/finalizers
  - livenesses/finalizers
  - securityattacks/finalizers
  - storagegroups/finalizers
  - targetgroups/finalizers
  verbs:
  - update
- apiGroups:
  - kttack.io
  resources:
  - enumerations/status
  - livenesses/status
  - securityattacks/status
  - storagegroups/status
  - targetgroups/status
  verbs:
  - get
  - patch
  - update
- apiGroups:
  - security.kttack.io
  resources:
  - osints
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - security.kttack.io
  resources:
  - osints/finalizers
  verbs:
  - update
- apiGroups:
  - security.kttack.io
  resources:
  - osints/status
  verbs:
  - get
  - patch
  - update
