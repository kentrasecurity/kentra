---
apiVersion: kentra.sh/v1alpha1
kind: TargetPool
metadata:
  name: multi-host-pool-ips
  namespace: kentra-system
spec:
  target: 
    ip:
      - 192.168.1.201
      - 192.168.1.202
  port: "1-10000"
  description: "Three specific hosts for comprehensive port scanning"
---
apiVersion: kentra.sh/v1alpha1
kind: TargetPool
metadata:
  name: multi-host-pool-subnet
  namespace: kentra-system
spec:
  target: 
    ip:
      - 192.168.2.0/24
  port: "1-10000"
  description: "Three specific hosts for comprehensive port scanning"
---
