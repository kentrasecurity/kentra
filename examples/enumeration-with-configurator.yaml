---
# Example: Complete setup for Enumeration with ToolsConfigurator
#
# This example shows how to:
# 1. Create the kttack-tool-specs ConfigMap in kttack-system namespace
# 2. Create an Enumeration resource that uses the configured tools
#

apiVersion: v1
kind: Namespace
metadata:
  name: kttack-system
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: kttack-tool-specs
  namespace: kttack-system
data:
  tools: |
    nmap:
      type: "enumeration"
      image: "instrumentisto/nmap:latest"
      commandTemplate: "/bin/nmap {{.Args}} {{.Target}}"
      capabilities:
        add:
          - NET_RAW

    masscan:
      type: "enumeration"
      image: "robertdavidgraham/masscan:latest"
      commandTemplate: "/bin/masscan {{.Args}} {{.Target}}"
      capabilities:
        add:
          - NET_RAW

    nikto:
      type: "scanning"
      image: "ghcr.io/sullo/nikto:latest"
      commandTemplate: "/nikto -h {{.Target}} {{.Args}}"
      capabilities:
        add: []

    gobuster:
      type: "scanning"
      image: "aoighost/gobuster"
      commandTemplate: "/go/bin/gobuster {{.Args}} {{.Target}}"
      capabilities:
        add: []

    wpscan:
      type: "scanning"
      image: "wpscanteam/wpscan:latest"
      commandTemplate: "/wpscan --url {{.Target}} {{.Args}}"
      capabilities:
        add: []

    sqlmap:
      type: "exploitation"
      image: "sqlmapproject/sqlmap:latest"
      commandTemplate: "/sqlmap -u {{.Target}} {{.Args}}"
      capabilities:
        add: []

    feroxbuster:
      type: "scanning"
      image: "epi052/feroxbuster"
      commandTemplate: "/feroxbuster -u {{.Target}} {{.Args}}"
      capabilities:
        add: []

    dirsearch:
      type: "scanning"
      image: "maurosoria/dirsearch:latest"
      commandTemplate: "/dirsearch -u {{.Target}} {{.Args}}"
      capabilities:
        add: []

---
# Example Enumeration resources using the configured tools

apiVersion: kttack.io/v1alpha1
kind: Enumeration
metadata:
  name: nmap-scan-example
  namespace: default
spec:
  tool: "nmap"
  target: "192.168.1.0/24"
  args:
    - "-sV"
    - "-p"
    - "22,80,443"
  periodic: false
  fileName:
    - "nmap-results.xml"
---
apiVersion: kttack.io/v1alpha1
kind: Enumeration
metadata:
  name: masscan-continuous
  namespace: default
spec:
  tool: "masscan"
  target: "10.0.0.0/8"
  args:
    - "-p0-65535"
  periodic: true
  schedule: "0 2 * * *"  # Daily at 2 AM
  fileName:
    - "masscan-results.txt"
---
# Example: Query tools of specific type
# In a reconciler:
#   enumerationTools := r.Configurator.GetToolsByType("enumeration")
#   // enumerationTools contains: nmap, masscan
#
#   scanningTools := r.Configurator.GetToolsByType("scanning")
#   // scanningTools contains: nikto, gobuster, wpscan, feroxbuster, dirsearch
#
#   exploitationTools := r.Configurator.GetToolsByType("exploitation")
#   // exploitationTools contains: sqlmap

# Notes:
# 1. Replace default namespace with your target namespace
# 2. The controller must have Configurator injected from main.go
# 3. ConfigMap must be in kttack-system namespace
# 4. Tool names in Enumeration.spec.tool must match ConfigMap keys
# 5. Command templates use Go text/template syntax
