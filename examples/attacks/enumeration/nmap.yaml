---
apiVersion: kentra.sh/v1alpha1
kind: TargetPool
metadata:
  name: targetpool-test
  namespace: kentra-system
spec:
  description: "Direct target for nmap"
  targets:  
    - name: test1
      endpoint: 
        - "192.168.1.0/24"
        - "192.168.2.0"
      port:
        - "22"
        - "80"
    - name: test2
      endpoint: 
        - "192.168.3.1"
      port:
        - "22-443"
---
apiVersion: kentra.sh/v1alpha1
kind: Enumeration
metadata:
  name: nmap-scan-example-2
  namespace: kentra-system
spec:
  tool: "nmap"
  targetPool: targetpool-test
  category: "network-scan"
  args:
    - "-sV"
  debug: true
  periodic: false