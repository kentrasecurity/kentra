# Examples of Kentra Custom Resources
# These examples show how to use Enumeration, Liveness

---
# Example 1: Simple one-time Enumeration with nmap
apiVersion: kentra.sh/v1alpha1
kind: Enumeration
metadata:
  name: nmap-quick-scan
  namespace: default
spec:
  tool: "nmap"
  target: "192.168.1.0/24"
  args:
    - "-sV"
    - "-p"
    - "22,80,443"
  periodic: false
  debug: false

---
# Example 2: Periodic Enumeration with masscan (runs daily at 2 AM)
apiVersion: kentra.sh/v1alpha1
kind: Enumeration
metadata:
  name: masscan-daily
  namespace: default
spec:
  tool: "masscan"
  target: "10.0.0.0/8"
  args:
    - "-p0-65535"
    - "-rate=10000"
  periodic: true
  schedule: "0 2 * * *"
  debug: false

---
# Example 3: Enumeration with HTTP proxy and additional environment variables
apiVersion: kentra.sh/v1alpha1
kind: Enumeration
metadata:
  name: nmap-with-proxy
  namespace: default
spec:
  tool: "nikto"
  target: "http://example.com"
  args:
    - "-o"
    - "/tmp/nikto-results.html"
  http_proxy: "http://proxy.example.com:8080"
  additional_env:
    - name: "NIKTO_PLUGINS"
      value: "default"
  periodic: false
  debug: false

---
# Example 4: One-time Liveness check with ping
apiVersion: kentra.sh/v1alpha1
kind: Liveness
metadata:
  name: ping-host-check
  namespace: default
spec:
  tool: "ping"
  target: "8.8.8.8"
  args:
    - "-c"
    - "4"
  periodic: false
  debug: false

---
# Example 5: Periodic Liveness check (every 5 minutes)
apiVersion: kentra.sh/v1alpha1
kind: Liveness
metadata:
  name: ping-continuous
  namespace: default
spec:
  tool: "ping"
  target: "gateway.example.com"
  args:
    - "-c"
    - "2"
  periodic: true
  schedule: "*/5 * * * *"
  http_proxy: ""
  debug: false

---
# Example 9: Enumeration in debug mode (output to stdout)
apiVersion: kentra.sh/v1alpha1
kind: Enumeration
metadata:
  name: nmap-debug
  namespace: default
spec:
  tool: "nmap"
  target: "localhost"
  args:
    - "-p"
    - "1-1000"
  periodic: false
  debug: true
