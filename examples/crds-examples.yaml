# Examples of kttack Custom Resources
# These examples show how to use Enumeration, Liveness, and SecurityAttack resources

---
# Example 1: Simple one-time Enumeration with nmap
apiVersion: kttack.io/v1alpha1
kind: Enumeration
metadata:
  name: nmap-quick-scan
  namespace: default
spec:
  tool: "nmap"
  target: "192.168.1.0/24"
  args:
    - "-sV"
    - "-p"
    - "22,80,443"
  periodic: false
  debug: false

---
# Example 2: Periodic Enumeration with masscan (runs daily at 2 AM)
apiVersion: kttack.io/v1alpha1
kind: Enumeration
metadata:
  name: masscan-daily
  namespace: default
spec:
  tool: "masscan"
  target: "10.0.0.0/8"
  args:
    - "-p0-65535"
    - "-rate=10000"
  periodic: true
  schedule: "0 2 * * *"
  debug: false

---
# Example 3: Enumeration with HTTP proxy and additional environment variables
apiVersion: kttack.io/v1alpha1
kind: Enumeration
metadata:
  name: nmap-with-proxy
  namespace: default
spec:
  tool: "nikto"
  target: "http://example.com"
  args:
    - "-o"
    - "/tmp/nikto-results.html"
  http_proxy: "http://proxy.example.com:8080"
  additional_env:
    - name: "NIKTO_PLUGINS"
      value: "default"
  periodic: false
  debug: false

---
# Example 4: One-time Liveness check with ping
apiVersion: kttack.io/v1alpha1
kind: Liveness
metadata:
  name: ping-host-check
  namespace: default
spec:
  tool: "ping"
  target: "8.8.8.8"
  args:
    - "-c"
    - "4"
  periodic: false
  debug: false

---
# Example 5: Periodic Liveness check (every 5 minutes)
apiVersion: kttack.io/v1alpha1
kind: Liveness
metadata:
  name: ping-continuous
  namespace: default
spec:
  tool: "ping"
  target: "gateway.example.com"
  args:
    - "-c"
    - "2"
  periodic: true
  schedule: "*/5 * * * *"
  http_proxy: ""
  debug: false

---
# Example 6: Simple one-time SecurityAttack
apiVersion: kttack.io/v1alpha1
kind: SecurityAttack
metadata:
  name: sqlmap-check
  namespace: default
spec:
  attackType: "Exploitation"
  target: "http://vulnerable-app.local/login"
  tool: "sqlmap"
  args:
    - "-p"
    - "username"
    - "--batch"
  periodic: false
  debug: false

---
# Example 7: Periodic SecurityAttack (weekly vulnerability scan)
apiVersion: kttack.io/v1alpha1
kind: SecurityAttack
metadata:
  name: gobuster-weekly-scan
  namespace: default
spec:
  attackType: "Enumeration"
  target: "http://api.example.com"
  tool: "gobuster"
  args:
    - "dir"
    - "-w"
    - "/usr/share/wordlists/common.txt"
  periodic: true
  schedule: "0 3 * * 0"  # Sunday at 3 AM
  http_proxy: ""
  debug: false

---
# Example 8: SecurityAttack with environment variables and proxy
apiVersion: kttack.io/v1alpha1
kind: SecurityAttack
metadata:
  name: custom-attack
  namespace: default
spec:
  attackType: "Vulnerability"
  target: "https://webapp.example.com"
  tool: "custom-tool"
  args:
    - "--output"
    - "/tmp/results"
  http_proxy: "http://proxy.corp.local:3128"
  additional_env:
    - name: "API_KEY"
      value: "secret-key"
    - name: "TIMEOUT"
      value: "300"
  periodic: false
  debug: true  # Enable debug mode for stdout output

---
# Example 9: Enumeration in debug mode (output to stdout)
apiVersion: kttack.io/v1alpha1
kind: Enumeration
metadata:
  name: nmap-debug
  namespace: default
spec:
  tool: "nmap"
  target: "localhost"
  args:
    - "-p"
    - "1-1000"
  periodic: false
  debug: true
